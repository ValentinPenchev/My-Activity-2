<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Премиум градиент, съобразен с цветовете на твоята игра -->
    <linearGradient id="appleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff512f" />
      <stop offset="100%" stop-color="#dd2476" />
    </linearGradient>
    
    <!-- Фина, мека сянка за SaaS ефект -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.06" />
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.04" />
    </filter>
  </defs>

  <!-- Базов заоблен квадрат в Apple стил (iOS App Icon стил) -->
  <rect x="32" y="32" width="448" height="448" rx="105" fill="#f5f5f7" filter="url(#softShadow)" />
  <rect x="34" y="34" width="444" height="444" rx="103" fill="#ffffff" />

  <!-- Централна минималистична емблема (Стилизирано "A" за Activity от три преплитащи се елемента) -->
  <g transform="translate(146, 130)">
    <!-- Ляв елемент (Рисуване/Крива) -->
    <path d="M40 220 C 10 180, 10 110, 40 70 L 80 20 C 90 5, 110 5, 120 20 L 130 35 C 110 70, 110 120, 130 155 Z" fill="url(#appleGradient)" opacity="0.85" />
    
    <!-- Десен елемент (Действие/Маска) -->
    <path d="M180 220 C 210 180, 210 110, 180 70 L 140 20 C 130 5, 110 5, 100 20 L 90 35 C 110 70, 110 120, 90 155 Z" fill="url(#appleGradient)" />
    
    <!-- Централен свързващ елемент (Реч/Комуникация) -->
    <circle cx="110" cy="105" r="35" fill="#ffffff" />
    <circle cx="110" cy="105" r="22" fill="url(#appleGradient)" opacity="0.9" />
  </g>
</svg>
